{% import "macros.html" as macros %}
{% extends "base.html" %}

{% block body %}
<div class="wrapper">
  <header class="header">
    <h1 class="header-title center"><a href="/tags" style="text-decoration:none;border:none;">&larr;</a> {{ term.name | upper }}.</h1>
  </header>
  <main aria-label="Content">
    {% for post in term.pages %}
      <a href="{{ post.permalink }}" class="post-item">
        <span class="post-item-date">{{ post.date | date(format="%b %d, %Y") }}</span>
        <h3 class="post-item-title">{{ post.title }}</h3>
        {% if post.description %}
          <p class="post-item-description">{{ post.description }}</p>
        {% endif %}
      </a>
    {% endfor %}
  </main>
  <footer class="footer"></footer>
  <script src="/assets/js/main.js" defer="defer"></script>
</div>
{% endblock body %}
